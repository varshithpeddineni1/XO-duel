# Nginx reverse-proxy site config for xoduel.duckdns.org (spec §10, adapted for DuckDNS +
# Certbot instead of a purchased domain + Cloudflare). Copy to
# /etc/nginx/sites-available/xo-duel on the VPS, symlink into sites-enabled, then
# `nginx -t && systemctl reload nginx` — BEFORE running certbot (see docs/runbook.md).
#
# This file intentionally has no SSL block. `certbot --nginx -d xoduel.duckdns.org` edits
# this file in place on the VPS to add the port-443 server block (pointing at its own
# Let's Encrypt cert under /etc/letsencrypt/live/) and the port-80 -> 443 redirect. Don't
# re-copy this repo file over the live config after that, or you'll wipe out certbot's
# additions and have to re-run it.

server {
    listen 80;
    listen [::]:80;
    server_name xoduel.duckdns.org;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Socket.io needs these — without them this is just a REST proxy and every
        # online-game connection fails to upgrade to a WebSocket (API-8).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A game's socket can sit idle between moves for a while — don't let Nginx's
        # default read timeout drop a perfectly live connection mid-game.
        proxy_read_timeout 86400;
    }
}
