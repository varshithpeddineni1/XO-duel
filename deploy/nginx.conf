# Nginx reverse-proxy site config (spec §10). Copy to
# /etc/nginx/sites-available/xo-duel on the VPS, symlink into sites-enabled, then
# `nginx -t && systemctl reload nginx`. Replace api.example.com with your real subdomain
# (see docs/runbook.md for the full Cloudflare/DNS/origin-certificate setup this depends
# on — this file alone isn't enough without those steps done first).

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.example.com;

    # Cloudflare Origin Certificate (SSL/TLS > Origin Server in the Cloudflare dashboard —
    # free, 15-year validity). This terminates TLS between Cloudflare and this box too
    # ("Full (strict)" mode), not just between visitors and Cloudflare — satisfies SEC-7's
    # "no plaintext HTTP to the origin from the public internet" more strictly than
    # Cloudflare's "Flexible" mode would.
    ssl_certificate     /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Socket.io needs these — without them this is just a REST proxy and every
        # online-game connection fails to upgrade to a WebSocket (API-8).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A game's socket can sit idle between moves for a while — don't let Nginx's
        # default read timeout drop a perfectly live connection mid-game.
        proxy_read_timeout 86400;
    }
}
